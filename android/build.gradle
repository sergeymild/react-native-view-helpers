buildscript {
  ext.ViewHelpers = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return ViewHelpers[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.viewhelpers"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:${getExtOrDefault('kotlinVersion')}"

  // alerts: AlertsModule / BottomSheetAlert use Material BottomSheetDialog,
  // TextInputLayout, CardView and the material-dialogs library
  implementation 'com.afollestad.material-dialogs:core:3.3.0'
  implementation 'com.afollestad.material-dialogs:input:3.3.0'
  implementation 'com.google.android.material:material:1.12.0'
  implementation "androidx.cardview:cardview:1.0.0"

  // lifecycle: LifecycleModule observes ProcessLifecycleOwner
  implementation "androidx.lifecycle:lifecycle-common:2.6.2"
  implementation "androidx.lifecycle:lifecycle-process:2.6.2"
}
